name: Send Team Plan Email

on:
  repository_dispatch:
    types: [send_team_plan_email]
  workflow_dispatch:
    inputs:
      subject:
        description: 'Email subject line'
        required: false
        default: 'THCO Content Plan'
      email_file:
        description: 'HTML file in repo to send'
        required: false
        default: 'team_plan_email.html'
      is_test:
        description: 'Send test to manager only (true/false)'
        required: false
        default: 'false'

jobs:
  send_team_email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Resolve variables
        id: vars
        run: |
          SUBJECT="${{ github.event.client_payload.subject }}"
          if [ -z "$SUBJECT" ]; then SUBJECT="${{ github.event.inputs.subject }}"; fi
          if [ -z "$SUBJECT" ]; then SUBJECT="THCO Content Plan: Week 1"; fi
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT

          FILE="${{ github.event.client_payload.email_file }}"
          if [ -z "$FILE" ]; then FILE="${{ github.event.inputs.email_file }}"; fi
          if [ -z "$FILE" ]; then FILE="team_plan_email.html"; fi
          echo "email_file=$FILE" >> $GITHUB_OUTPUT

          IS_TEST="${{ github.event.client_payload.is_test }}"
          if [ -z "$IS_TEST" ]; then IS_TEST="${{ github.event.inputs.is_test }}"; fi
          if [ -z "$IS_TEST" ]; then IS_TEST="false"; fi
          echo "is_test=$IS_TEST" >> $GITHUB_OUTPUT

      - name: Send email
        run: python send_team_email.py
        env:
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          MANAGER_EMAIL:      ${{ secrets.MANAGER_EMAIL }}
          UPLOAD_TOKEN:       ${{ secrets.UPLOAD_TOKEN }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          EMAIL_SUBJECT:      ${{ steps.vars.outputs.subject }}
          EMAIL_FILE:         ${{ steps.vars.outputs.email_file }}
          IS_TEST:            ${{ steps.vars.outputs.is_test }}
